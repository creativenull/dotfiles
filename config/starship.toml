"$schema" = 'https://starship.rs/config-schema.json'

format = """
$hostname\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$deno\
$mise\
$nodejs\
$php\
$python\
$cmd_duration\
$line_break\
$character\
"""

scan_timeout = 500
command_timeout = 1000
add_newline = false

[directory]
truncation_length = 2

[git_metrics]
disabled = false
